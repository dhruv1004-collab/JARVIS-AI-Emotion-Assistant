<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>JARVIS — Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            width: 100%;
            background: rgba(0,245,255,0.03);
            border-bottom: 1px solid rgba(0,245,255,0.15);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-logo {
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: #00f5ff;
            text-shadow: 0 0 20px rgba(0,245,255,0.5);
        }

        .nav-logo span { color: #00ff88; }

        .nav-subtitle {
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.25);
            margin-top: 2px;
        }

        .center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(0,245,255,0.03);
            border: 1px solid rgba(0,245,255,0.15);
            border-radius: 8px;
            padding: 40px;
            width: 400px;
        }

        .card-title {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #00f5ff;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.65rem;
            letter-spacing: 3px;
            color: rgba(0,245,255,0.5);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(0,245,255,0.03);
            border: 1px solid rgba(0,245,255,0.25);
            color: #00ff88;
            font-family: monospace;
            font-size: 0.85rem;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: rgba(0,245,255,0.6);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid #00f5ff;
            color: #00f5ff;
            font-family: monospace;
            font-size: 0.85rem;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: rgba(0,245,255,0.1);
            box-shadow: 0 0 20px rgba(0,245,255,0.2);
        }

        .link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.72rem;
            color: rgba(0,245,255,0.4);
        }

        .link a {
            color: #00f5ff;
            text-decoration: none;
        }

        .link a:hover { text-decoration: underline; }

        .error {
            background: rgba(255,45,85,0.1);
            border: 1px solid rgba(255,45,85,0.3);
            color: #ff2d55;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>
        <div>
            <div class="nav-logo">JAR<span>VIS</span></div>
            <div class="nav-subtitle">PERSONAL AI EMOTION ASSISTANT</div>
        </div>
    </nav>

    <div class="center">
        <div class="card">
            <div class="card-title">⬡ CREATE ACCOUNT</div>

            <!-- Error message -->
            <div th:if="${error}" class="error" th:text="${error}"></div>

            <form method="post" action="/Jarvis/1.0/register">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" name="name" placeholder="Your Name" required/>
                </div>
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" name="email" placeholder="your@gmail.com" required/>
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" name="password" placeholder="••••••••" required/>
                </div>
                <button type="submit" class="btn">▶ CREATE ACCOUNT</button>
            </form>

            <div class="link">
                Already have an account? <a href="/Jarvis/1.0/login">Login here</a>
            </div>
        </div>
    </div>

</body>
</html>
